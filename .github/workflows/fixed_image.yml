name: "Fixed Docker Image"

on:
  push:
    branches:
      - feature-*
  workflow_dispatch:

env:
  DOCKERHUB_SLUG: gyuszka3/maintainerr

jobs:
  build-docker-image:
    name: Build ${{ matrix.platform }}
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: "true"

      - name: Get latest tag
        id: fetch-tags
        uses: actions-ecosystem/action-get-latest-tag@v1

      - name: Bump tag
        id: tags
        run: |
          latest_tag="${{ steps.fetch-tags.outputs.tag }}"
          major=$(echo "$latest_tag" | awk -F '.' '{print $1}')
          minor=$(echo "$latest_tag" | awk -F '.' '{print $2}')
          patch=$(echo "$latest_tag" | awk -F '.' '{print $3}')
          patch=$(($patch + 1))
          echo "$major.$minor.$patch"
          echo "tag=$major.$minor.$patch" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          # Push by digest; tags get applied in the merge job
          outputs: type=image,"name=${{ env.DOCKERHUB_SLUG }}",push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            VERSION_TAG=${{ steps.tags.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        shell: bash
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "Digest: $digest"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

    outputs:
      tag: ${{ steps.tags.outputs.tag }}

  merge:
    name: Merge Docker digests and push dev tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
      - build-docker-image

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME  }}
          password: ${{ secrets.DOCKERHUB_TOKEN  }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        shell: bash
        env:
          TAG: ${{ needs.build-docker-image.outputs.tag }}
        run: |
          echo "Pushing multi-arch dev tag: $TAG"

          docker buildx imagetools create \
            --tag "${{ env.DOCKERHUB_SLUG }}:${TAG}" \
            $(printf '${{ env.DOCKERHUB_SLUG }}@sha256:%s ' *)
          docker buildx imagetools create \
            --tag "${{ env.DOCKERHUB_SLUG }}:latest" \
            $(printf '${{ env.DOCKERHUB_SLUG }}@sha256:%s ' *)
